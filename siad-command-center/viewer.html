<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAD Command Center - Satellite Prediction Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            background: #0a0a0a;
            color: #f5f5f5;
            line-height: 1.6;
        }

        .header {
            background: rgba(26, 26, 26, 0.95);
            border-bottom: 1px solid #14b8a6;
            padding: 2rem;
            text-align: center;
        }

        .header h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #14b8a6;
            text-shadow: 0 0 20px rgba(20, 184, 166, 0.5);
        }

        .header p {
            color: #737373;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            letter-spacing: 0.05em;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .stat-card {
            background: #1a1a1a;
            border: 1px solid #262626;
            border-radius: 0.25rem;
            padding: 1.5rem;
            text-align: center;
        }

        .stat-card .label {
            color: #737373;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .stat-card .value {
            color: #14b8a6;
            font-size: 1.75rem;
            font-weight: 700;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 2rem 2rem 1rem;
            border-bottom: 1px solid #262626;
        }

        .tab {
            background: transparent;
            border: 1px solid #14b8a6;
            color: #14b8a6;
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 200ms ease;
        }

        .tab:hover {
            background: rgba(20, 184, 166, 0.1);
            box-shadow: 0 0 20px rgba(20, 184, 166, 0.3);
        }

        .tab.active {
            background: rgba(245, 158, 11, 0.15);
            border-color: #f59e0b;
            color: #f59e0b;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.4);
        }

        .gallery {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .tile-card {
            background: #1a1a1a;
            border: 1px solid #262626;
            border-radius: 0.25rem;
            overflow: hidden;
            transition: all 200ms ease;
            cursor: pointer;
        }

        .tile-card:hover {
            border-color: #14b8a6;
            box-shadow: 0 0 15px rgba(20, 184, 166, 0.2);
        }

        .placeholder {
            color: #737373;
            text-align: center;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>SIAD Command Center</h1>
        <p>Satellite Imagery Anticipatory Dynamics - 6-Month Prediction Gallery</p>
    </div>

    <div class="stats" id="stats">
        <div class="stat-card">
            <div class="label">Total Tiles</div>
            <div class="value">15</div>
        </div>
        <div class="stat-card">
            <div class="label">Best MSE</div>
            <div class="value">0.0664</div>
        </div>
        <div class="stat-card">
            <div class="label">Median MSE</div>
            <div class="value">0.1079</div>
        </div>
        <div class="stat-card">
            <div class="label">Worst MSE</div>
            <div class="value">0.1986</div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" data-category="all">All Tiles</button>
        <button class="tab" data-category="best">Best</button>
        <button class="tab" data-category="average">Average</button>
        <button class="tab" data-category="worst">Worst</button>
    </div>

    <div class="gallery">
        <div class="gallery-grid" id="gallery">
            <div class="placeholder">
                Gallery viewer ready. Start FastAPI backend to load predictions:
                <br><br>
                cd siad-command-center/api && uvicorn main:app --reload
            </div>
        </div>
    </div>

    <script>
        const galleryData = {
            stats: {
                num_tiles: 15,
                best_mse: 0.0664,
                median_mse: 0.1079,
                worst_mse: 0.1986
            },
            tiles: {
                best: ["tile_x002_y000", "tile_x003_y002", "tile_x002_y002", "tile_x002_y003", "tile_x001_y000"],
                worst: ["tile_x000_y002", "tile_x000_y001", "tile_x000_y005", "tile_x000_y004", "tile_x001_y004"],
                average: ["tile_x003_y003", "tile_x003_y001", "tile_x001_y003", "tile_x002_y001", "tile_x002_y004"]
            }
        };

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                loadGallery(tab.dataset.category);
            });
        });

        function loadGallery(category) {
            const gallery = document.getElementById('gallery');

            // Clear gallery
            while (gallery.firstChild) {
                gallery.removeChild(gallery.firstChild);
            }

            const placeholder = document.createElement('div');
            placeholder.className = 'placeholder';
            placeholder.textContent = 'Connect to FastAPI backend (port 8000) to load tile predictions for: ' + category;
            gallery.appendChild(placeholder);
        }
    </script>
</body>
</html>
