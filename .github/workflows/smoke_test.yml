name: SIAD Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache UV dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync

      - name: Lint with ruff
        run: uv run ruff check src/ tests/
        continue-on-error: true

      - name: Format check with black
        run: uv run black --check src/ tests/
        continue-on-error: true

      - name: Run contract tests
        run: uv run pytest tests/contract/ -v

      - name: Test CLI help commands
        run: |
          uv run siad --help
          uv run siad export --help
          uv run siad train --help
          uv run siad detect --help
          uv run siad report --help

      - name: Test config validation
        run: uv run siad export --config configs/quickstart-demo.yaml --dry-run
        continue-on-error: true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: logs/
          retention-days: 7
