# Training Configuration for Temporal Conditioning (V2)
# Feature: 003-temporal-conditioning
#
# This configuration enables temporal conditioning by using action_dim=4
# to include month-of-year cyclical features (month_sin, month_cos) alongside
# weather anomalies (rain_anom, temp_anom).
#
# Expected Improvements:
# - >20% reduction in false anomalies during seasonal transitions
# - Rollout error at step 6 < 15% growth (vs >30% baseline)
# - <5% training throughput degradation

data:
  dataset: "gcs://siad-training-data"
  train_split: 0.8
  val_split: 0.2
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  preprocessing_version: "v2"  # Enable temporal features
  action_dim: 4                 # Extended action vector

training:
  batch_size: 32
  epochs: 50

  # Optimization
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  grad_clip_norm: 1.0

  # Mixed precision
  mixed_precision: "bf16"

  # Gradient accumulation
  gradient_accumulation_steps: 1

  # Scheduler
  scheduler: "cosine"
  warmup_steps: 500

  # EMA
  ema_momentum: 0.996

  # Checkpointing
  save_every: 5
  checkpoint_dir: "checkpoints/temporal_v2"
  keep_last_n: 3

  # Logging
  log_every: 10
  use_wandb: true
  wandb_project: "siad-temporal-conditioning"

  # Reproducibility
  seed: 42

model:
  # Architecture per MODEL.md
  in_channels: 8
  latent_dim: 512
  action_dim: 4  # V2: [rain_anom, temp_anom, month_sin, month_cos]

  # Encoder
  encoder_blocks: 4
  encoder_heads: 8
  encoder_mlp_dim: 2048

  # Transition
  transition_blocks: 6
  transition_heads: 8
  transition_mlp_dim: 2048

  # Decoder
  decoder_blocks: 4
  decoder_heads: 8
  decoder_mlp_dim: 2048

  # Action encoder (v2-specific)
  action_encoder:
    input_dim: 4        # 2 weather + 2 temporal
    hidden_dim: 64
    output_dim: 128

# Validation
validation:
  eval_every: 5          # Evaluate every 5 epochs
  num_rollout_steps: 6   # Test 6-month rollouts
  save_predictions: true # Save rollout visualizations

# Comments for reference
# Action vector schema (v2):
#   [0]: rain_anom    - CHIRPS precipitation anomaly (z-score)
#   [1]: temp_anom    - ERA5 temperature anomaly (z-score)
#   [2]: month_sin    - sin(2π * month / 12)
#   [3]: month_cos    - cos(2π * month / 12)
#
# Backward compatibility:
#   - V1 checkpoints (action_dim=2) can load into V2 models
#   - Temporal weights will be zero-initialized automatically
#   - Fine-tuning from V1→V2 supported via model.load_state_dict()
