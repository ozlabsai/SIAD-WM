# Model size configurations for SIAD World Model
# Use with: --model-config configs/model_sizes.yaml --model-size medium

tiny:
  # 54M params - Current baseline
  # VRAM: ~1GB, Training: ~9 min/50 epochs
  latent_dim: 512
  encoder_blocks: 4
  encoder_heads: 8
  encoder_mlp_dim: 2048
  transition_blocks: 6
  transition_heads: 8
  transition_mlp_dim: 2048
  dropout: 0.1

small:
  # 150M params - Good for small datasets
  # VRAM: ~3GB, Training: ~20 min/50 epochs
  latent_dim: 768
  encoder_blocks: 6
  encoder_heads: 12
  encoder_mlp_dim: 3072
  transition_blocks: 8
  transition_heads: 12
  transition_mlp_dim: 3072
  dropout: 0.1

medium:
  # 400M params - Production quality
  # VRAM: ~8GB, Training: ~45 min/50 epochs
  latent_dim: 1024
  encoder_blocks: 8
  encoder_heads: 16
  encoder_mlp_dim: 4096
  transition_blocks: 12
  transition_heads: 16
  transition_mlp_dim: 4096
  dropout: 0.1

large:
  # 1.2B params - High capacity
  # VRAM: ~20GB, Training: ~2 hrs/50 epochs
  latent_dim: 1536
  encoder_blocks: 12
  encoder_heads: 24
  encoder_mlp_dim: 6144
  transition_blocks: 16
  transition_heads: 24
  transition_mlp_dim: 6144
  dropout: 0.15

xlarge:
  # 3B+ params - Maximum capacity
  # VRAM: ~40GB+, Training: ~6 hrs/50 epochs
  latent_dim: 2048
  encoder_blocks: 16
  encoder_heads: 32
  encoder_mlp_dim: 8192
  transition_blocks: 24
  transition_heads: 32
  transition_mlp_dim: 8192
  dropout: 0.2

# Recommended scaling path:
# 1. Start with 'tiny' - validate pipeline works (✓ done!)
# 2. Move to 'small' - with ~100 tiles
# 3. Move to 'medium' - with 500+ tiles
# 4. Move to 'large' - with 1000+ tiles
# 5. Move to 'xlarge' - for production deployment
