# SIAD Test Export Configuration
# Small test to validate export pipeline before full run

aoi:
  aoi_id: "test-export"
  bounds:
    # San Francisco Bay Area - expanded to ~36km × 36km for 196 tiles
    # Covers SF, Oakland, Berkeley, San Jose - diverse urban/suburban/natural areas
    min_lon: -122.7
    max_lon: -122.2
    min_lat: 37.6
    max_lat: 37.9
  projection: "EPSG:3857"
  resolution_m: 10
  tile_size_px: 256

data:
  gcp_project: "siad-earth-engine"
  gcs_bucket: "siad-exports"
  export_path: "gs://siad-exports/siad/{aoi_id}"
  start_month: "2021-01"
  end_month: "2024-12"  # 48 months (4 years) for robust training
  sources:
    - "s1"      # Sentinel-1 SAR
    - "s2"      # Sentinel-2 optical
    - "viirs"   # VIIRS nighttime lights
    - "chirps"  # CHIRPS precipitation

model:
  latent_dim: 256
  context_length: 6
  rollout_horizon: 6
  batch_size: 16
  epochs: 50
  learning_rate: 1.0e-4
  seed: 42

detection:
  percentile_threshold: 99.0
  persistence_months: 2
  min_cluster_size: 3
  scenarios:
    - "neutral"
    - "observed"
